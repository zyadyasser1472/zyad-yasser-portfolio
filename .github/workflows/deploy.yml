      - name: Build Next.js app
        run: npm run build

      - name: Check build output and logs
        if: always()
        run: |
          echo "=== Directory listing ==="
          ls -la
          echo ""
          echo "=== Checking out directory ==="
          ls -la out/ 2>&1 || echo "out directory not found"
          echo ""
          echo "=== Checking .next directory ==="
          ls -la .next/ 2>&1 || echo ".next directory not found"